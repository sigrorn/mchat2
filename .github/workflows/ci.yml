# CI: lint + typecheck + unit tests on every push to main and every PR.
# The unit suite is webview-independent (Vitest + jsdom + sql.js), so it
# runs on a plain ubuntu-latest with no Tauri runtime. Playwright e2e
# (needs a built Tauri app), `vite build`, and the Rust compile are
# deliberately out of scope here to keep the loop fast (~3 min). See #303.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --pretty false

      - name: Unit tests
        run: npm test
